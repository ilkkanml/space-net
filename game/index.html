<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S.P.A.C.E. NET — v0.1 Milestone 03</title>
  <link rel="stylesheet" href="./css/style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <canvas id="game-canvas"></canvas>

    <div class="hud top-left">
      <div class="label">S.P.A.C.E. NET</div>
      <div class="value">Milestone 03 — Game State & Resources</div>
    </div>

    <div class="resource-bar" id="resource-bar"></div>

    <div class="hud bottom-left">
      <div>Drag: Pan</div>
      <div>Mouse Wheel: Zoom</div>
      <div>Q / E: Rotate Camera</div>
      <div>Click Deposit: Select</div>
    </div>

    <div class="hud top-right">
      <div class="label">Status</div>
      <div id="status-text" class="value">Initializing scene...</div>
    </div>

    <div class="hud selection-panel" id="selection-panel">
      <div class="label">Selection</div>
      <div id="selection-name" class="value">None</div>
      <div id="selection-type" class="muted">Click a world object</div>
      <div id="selection-description" class="description"></div>
      <button id="selection-action" class="action-button hidden" type="button"></button>
    </div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
