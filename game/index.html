<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S.P.A.C.E. NET — v0.1 Milestone 08</title>
  <link rel="stylesheet" href="./css/style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <canvas id="game-canvas"></canvas>

    <div class="hud top-left">
      <div class="label">S.P.A.C.E. NET</div>
      <div class="value">Milestone 08 — E.V.A. Notifications</div>
    </div>

    <div class="hud mission-panel" id="mission-panel"></div>

    <div class="hud eva-panel" id="eva-panel">
      <div class="label">E.V.A.</div>
      <div class="eva-name">Engineering Virtual Assistant</div>
      <div id="eva-current-message" class="eva-current-message">Signal pending...</div>
      <div id="eva-notification-log" class="eva-notification-log"></div>
    </div>

    <div class="resource-bar" id="resource-bar"></div>

    <div class="hud bottom-left">
      <div>Drag: Pan</div>
      <div>Mouse Wheel: Zoom</div>
      <div>Q / E: Rotate Camera</div>
      <div>R: Rotate Conveyor Direction</div>
      <div>Click NEXUS: Mission Actions</div>
      <div>ESC: Cancel Build</div>
    </div>

    <div class="build-menu" id="build-menu"></div>

    <div class="hud top-right">
      <div class="label">Status</div>
      <div id="status-text" class="value">Initializing scene...</div>
    </div>

    <div class="hud selection-panel" id="selection-panel">
      <div class="label">Selection</div>
      <div id="selection-name" class="value">None</div>
      <div id="selection-type" class="muted">Click a world object</div>
      <div id="selection-description" class="description"></div>
      <div id="selection-nexus" class="machine-info hidden"></div>
      <div id="selection-machine" class="machine-info hidden"></div>
      <div id="selection-storage" class="machine-info hidden"></div>
      <div id="selection-conveyor" class="machine-info hidden"></div>
      <div id="selection-actions" class="actions"></div>
    </div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
